name: Daily Data Refresh

on:
  schedule:
    # Runs every day at 09:00 UTC (~4-5am US Eastern)
    - cron: '0 9 * * *'
  workflow_dispatch: {} # allows manual "Run workflow" button

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch sets
        run: npm run fetch:sets
        env:
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Fetch cards + prices
        run: npm run fetch:cards
        env:
          POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Calculate EV
        run: npm run calc:ev
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
